<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система управління рестораном</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🍽️ Ресторанний калькулятор</h1>
            <nav>
                <a href="{{ url_for('dashboard') }}">Головна</a>
                <a href="{{ url_for('ingredients') }}">Інгредієнти</a>
                <a href="{{ url_for('dishes') }}">Страви</a>
                <a href="{{ url_for('price_history') }}">Історія змін</a>
                <a href="{{ url_for('logout') }}">Вийти</a>
            </nav>
        </header>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="flash">
                    {% for message in messages %}
                        <p>{{ message }}</p>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
